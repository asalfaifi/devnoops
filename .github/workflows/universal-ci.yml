name: Reusable universal CI

on:
  workflow_call:
    inputs:
      full_scan:
        description: Run repository-wide checks instead of change-scoped checks
        required: false
        default: false
        type: boolean

permissions:
  contents: read

env:
  CI: "true"
  FORCE_COLOR: "1"
  UNIVERSAL_CI_FULL_SCAN: ${{ inputs.full_scan }}
  UNIVERSAL_CI_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before || '' }}

jobs:
  policy:
    name: Policy and repository integrity
    runs-on: [self-hosted, universal-ci]
    timeout-minutes: 15
    steps:
      - name: Check out application
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Check out universal CI engine
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: asalfaifi/devnoops
          ref: 65c69d1043b6254e31de00f64ae45d6e0ce88d33
          path: _universal-ci
          persist-credentials: false
      - name: Validate repository policy
        run: /opt/homebrew/bin/bash _universal-ci/.github/ci/universal.sh policy

  shift-left:
    name: Shift-left change security
    needs: policy
    runs-on: [self-hosted, universal-ci]
    timeout-minutes: 30
    steps:
      - name: Check out application
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Check out universal CI engine
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: asalfaifi/devnoops
          ref: 65c69d1043b6254e31de00f64ae45d6e0ce88d33
          path: _universal-ci
          persist-credentials: false
      - name: Gate changed code and infrastructure early
        run: /opt/homebrew/bin/bash _universal-ci/.github/ci/universal.sh shift-left
      - name: Upload shift-left evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: shift-left-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          path: .ci-artifacts/shift-left
          if-no-files-found: warn
          retention-days: 30

  lint:
    name: Developer experience and lint
    needs: shift-left
    runs-on: [self-hosted, universal-ci]
    timeout-minutes: 30
    steps:
      - name: Check out application
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Check out universal CI engine
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: asalfaifi/devnoops
          ref: 65c69d1043b6254e31de00f64ae45d6e0ce88d33
          path: _universal-ci
          persist-credentials: false
      - name: Run adaptive linters
        run: /opt/homebrew/bin/bash _universal-ci/.github/ci/universal.sh lint

  test:
    name: Unit and integration tests
    needs: shift-left
    runs-on: [self-hosted, universal-ci]
    timeout-minutes: 60
    steps:
      - name: Check out application
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          lfs: true
          persist-credentials: false
      - name: Check out universal CI engine
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: asalfaifi/devnoops
          ref: 65c69d1043b6254e31de00f64ae45d6e0ce88d33
          path: _universal-ci
          persist-credentials: false
      - name: Run adaptive test suites
        run: /opt/homebrew/bin/bash _universal-ci/.github/ci/universal.sh test
      - name: Upload test evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-evidence-${{ github.run_id }}
          path: .ci-artifacts/test
          if-no-files-found: ignore
          retention-days: 14

  security:
    name: Security, dependencies, and SBOM
    needs: shift-left
    runs-on: [self-hosted, universal-ci]
    timeout-minutes: 60
    steps:
      - name: Check out application
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Check out universal CI engine
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: asalfaifi/devnoops
          ref: 65c69d1043b6254e31de00f64ae45d6e0ce88d33
          path: _universal-ci
          persist-credentials: false
      - name: Run security gates and generate SBOM
        run: /opt/homebrew/bin/bash _universal-ci/.github/ci/universal.sh security
      - name: Upload security evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: security-evidence-${{ github.run_id }}
          path: .ci-artifacts/security
          if-no-files-found: warn
          retention-days: 30

  build:
    name: Reproducible application and container build
    needs: [lint, test, security]
    runs-on: [self-hosted, universal-ci]
    timeout-minutes: 75
    steps:
      - name: Check out application
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          lfs: true
          persist-credentials: false
      - name: Check out universal CI engine
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: asalfaifi/devnoops
          ref: 65c69d1043b6254e31de00f64ae45d6e0ce88d33
          path: _universal-ci
          persist-credentials: false
      - name: Build detected applications and images
        run: /opt/homebrew/bin/bash _universal-ci/.github/ci/universal.sh build

  readiness:
    name: Production readiness and smoke checks
    needs: build
    runs-on: [self-hosted, universal-ci]
    timeout-minutes: 90
    steps:
      - name: Check out application
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          lfs: true
          persist-credentials: false
      - name: Check out universal CI engine
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: asalfaifi/devnoops
          ref: 65c69d1043b6254e31de00f64ae45d6e0ce88d33
          path: _universal-ci
          persist-credentials: false
      - name: Verify deployment assets and runtime images
        run: /opt/homebrew/bin/bash _universal-ci/.github/ci/universal.sh readiness
      - name: Upload readiness evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: readiness-evidence-${{ github.run_id }}
          path: .ci-artifacts/readiness
          if-no-files-found: ignore
          retention-days: 14

  gate:
    name: Required CI gate
    if: always()
    needs: [policy, shift-left, lint, test, security, build, readiness]
    runs-on: [self-hosted, universal-ci]
    timeout-minutes: 5
    steps:
      - name: Require every pipeline stage
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          printf '%s\n' "$NEEDS_JSON" | jq -e 'all(.[]; .result == "success")'
