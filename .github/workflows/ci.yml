name: Universal CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  schedule:
    - cron: "10 8 * * 6"
  workflow_dispatch:
    inputs:
      full_scan:
        description: Run repository-wide deep checks
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: universal-ci-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"
  FORCE_COLOR: "1"
  UNIVERSAL_CI_FULL_SCAN: ${{ github.event_name == 'schedule' || github.event.inputs.full_scan == 'true' }}
  UNIVERSAL_CI_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before || '' }}

jobs:
  policy:
    name: Policy and repository integrity
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, universal-ci]
    timeout-minutes: 15
    steps:
      - name: Check out application
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Validate repository policy
        uses: asalfaifi/devnoops/.github/actions/universal-phase@9ddf6e7a43b7b4bf28f452e5637a2df3906f3254
        with:
          phase: policy
      - name: Upload policy evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: policy-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          path: .ci-artifacts/policy
          if-no-files-found: warn
          retention-days: 14

  shift-left:
    name: Shift-left change security
    needs: policy
    runs-on: [self-hosted, universal-ci]
    timeout-minutes: 30
    steps:
      - name: Check out application
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Gate changed code and infrastructure early
        uses: asalfaifi/devnoops/.github/actions/universal-phase@9ddf6e7a43b7b4bf28f452e5637a2df3906f3254
        with:
          phase: shift-left
      - name: Upload shift-left evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: shift-left-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          path: .ci-artifacts/shift-left
          if-no-files-found: warn
          retention-days: 30

  lint:
    name: Developer experience and lint
    needs: shift-left
    runs-on: [self-hosted, universal-ci]
    timeout-minutes: 30
    steps:
      - name: Check out application
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Run adaptive linters
        uses: asalfaifi/devnoops/.github/actions/universal-phase@9ddf6e7a43b7b4bf28f452e5637a2df3906f3254
        with:
          phase: lint
      - name: Upload lint evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lint-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          path: .ci-artifacts/lint
          if-no-files-found: ignore
          retention-days: 14

  test:
    name: Unit and integration tests
    needs: shift-left
    runs-on: [self-hosted, universal-ci]
    timeout-minutes: 180
    steps:
      - name: Check out application
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          lfs: true
          persist-credentials: false
      - name: Run adaptive test suites
        uses: asalfaifi/devnoops/.github/actions/universal-phase@9ddf6e7a43b7b4bf28f452e5637a2df3906f3254
        with:
          phase: test
      - name: Upload test evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          path: .ci-artifacts/test
          if-no-files-found: ignore
          retention-days: 14

  security:
    name: Security, dependencies, and SBOM
    needs: shift-left
    runs-on: [self-hosted, universal-ci]
    timeout-minutes: 180
    steps:
      - name: Check out application
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Run security gates and generate SBOM
        uses: asalfaifi/devnoops/.github/actions/universal-phase@9ddf6e7a43b7b4bf28f452e5637a2df3906f3254
        with:
          phase: security
      - name: Upload security evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: security-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          path: .ci-artifacts/security
          if-no-files-found: warn
          retention-days: 30

  build:
    name: Reproducible application and container build
    needs: [lint, test, security]
    runs-on: [self-hosted, universal-ci]
    timeout-minutes: 240
    steps:
      - name: Check out application
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          lfs: true
          persist-credentials: false
      - name: Build detected applications and images
        uses: asalfaifi/devnoops/.github/actions/universal-phase@9ddf6e7a43b7b4bf28f452e5637a2df3906f3254
        with:
          phase: build
      - name: Upload build evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          path: .ci-artifacts/build
          if-no-files-found: ignore
          retention-days: 14

  readiness:
    name: Production readiness and smoke checks
    needs: build
    runs-on: [self-hosted, universal-ci]
    timeout-minutes: 240
    steps:
      - name: Check out application
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          lfs: true
          persist-credentials: false
      - name: Verify deployment assets and runtime images
        uses: asalfaifi/devnoops/.github/actions/universal-phase@9ddf6e7a43b7b4bf28f452e5637a2df3906f3254
        with:
          phase: readiness
      - name: Upload readiness evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: readiness-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          path: .ci-artifacts/readiness
          if-no-files-found: ignore
          retention-days: 14

  gate:
    name: Required CI gate
    if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    needs: [policy, shift-left, lint, test, security, build, readiness]
    runs-on: [self-hosted, universal-ci]
    timeout-minutes: 5
    steps:
      - name: Require every pipeline stage
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          printf '%s\n' "$NEEDS_JSON" | jq -e 'all(.[]; .result == "success")'
